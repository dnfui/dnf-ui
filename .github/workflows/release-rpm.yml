name: Release RPM

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rpm:
    name: Fedora RPM
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${GITHUB_REF_NAME}"
            echo "Expected tag format: 0.1.0"
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build RPM in Fedora
        shell: bash
        run: |
          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e GITHUB_REF="${GITHUB_REF}" \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            -v "$PWD:/workspace" \
            -w /workspace \
            fedora:latest \
            bash -lc '
              set -euo pipefail
              trap '\''chown -R "${HOST_UID}:${HOST_GID}" rpmbuild artifacts dnf-ui-latest.rpm dnf-ui-latest.src.rpm 2>/dev/null || true'\'' EXIT

              dnf -y install \
                appstream \
                catch-devel \
                dbus-daemon \
                desktop-file-utils \
                gcc-c++ \
                gettext \
                git \
                glib2-devel \
                gtk4-devel \
                libdnf5-devel \
                make \
                meson \
                ninja-build \
                rpm-build

              if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                spec_version="$(rpmspec -q --qf "%{VERSION}\n" dnf-ui.spec | head -n1)"
                if [ "${spec_version}" != "${GITHUB_REF_NAME}" ]; then
                  echo "Spec version does not match release tag"
                  echo "Spec version: ${spec_version}"
                  echo "Release tag: ${GITHUB_REF_NAME}"
                  exit 1
                fi
              fi

              git config --global --add safe.directory /workspace
              make rpm

              mkdir -p artifacts
              cp "$(readlink -f dnf-ui-latest.rpm)" artifacts/
              cp "$(readlink -f dnf-ui-latest.src.rpm)" artifacts/
            '

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dnf-ui-rpm-${{ github.run_number }}
          path: artifacts/*.rpm
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.rpm
