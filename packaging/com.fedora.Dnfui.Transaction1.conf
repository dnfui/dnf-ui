<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="com.fedora.Dnfui.Transaction1"/>
  </policy>

  <policy context="default">
    <allow send_destination="com.fedora.Dnfui.Transaction1"
           send_interface="org.freedesktop.DBus.Introspectable"
           send_member="Introspect"/>
    <allow send_destination="com.fedora.Dnfui.Transaction1"
           send_interface="com.fedora.Dnfui.Transaction1"
           send_member="StartTransaction"/>
    <allow send_destination="com.fedora.Dnfui.Transaction1"
           send_interface="com.fedora.Dnfui.Transaction1"
           send_member="StartUpgradeAllTransaction"/>
    <allow send_destination="com.fedora.Dnfui.Transaction1"
           send_interface="com.fedora.Dnfui.TransactionRequest1"
           send_member="Cancel"/>
    <allow send_destination="com.fedora.Dnfui.Transaction1"
           send_interface="com.fedora.Dnfui.TransactionRequest1"
           send_member="Apply"/>
    <allow send_destination="com.fedora.Dnfui.Transaction1"
           send_interface="com.fedora.Dnfui.TransactionRequest1"
           send_member="Release"/>
    <allow send_destination="com.fedora.Dnfui.Transaction1"
           send_interface="com.fedora.Dnfui.TransactionRequest1"
           send_member="GetPreview"/>
    <allow send_destination="com.fedora.Dnfui.Transaction1"
           send_interface="com.fedora.Dnfui.TransactionRequest1"
           send_member="GetResult"/>
  </policy>
</busconfig>
