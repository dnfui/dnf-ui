# Shared transaction service names, methods, and install paths for build rules,
# local smoke tests, and Docker service helpers.

TRANSACTION_SERVICE_NAME=com.fedora.Dnfui.Transaction1
TRANSACTION_SERVICE_MANAGER_PATH=/com/fedora/Dnfui/Transaction1
TRANSACTION_SERVICE_START_METHOD=com.fedora.Dnfui.Transaction1.StartTransaction
TRANSACTION_SERVICE_RESULT_METHOD=com.fedora.Dnfui.TransactionRequest1.GetResult
TRANSACTION_SERVICE_PREVIEW_METHOD=com.fedora.Dnfui.TransactionRequest1.GetPreview
TRANSACTION_SERVICE_APPLY_METHOD=com.fedora.Dnfui.TransactionRequest1.Apply
TRANSACTION_SERVICE_CANCEL_METHOD=com.fedora.Dnfui.TransactionRequest1.Cancel
TRANSACTION_SERVICE_RELEASE_METHOD=com.fedora.Dnfui.TransactionRequest1.Release

TRANSACTION_SERVICE_BIN_NAME=dnfui-service
TRANSACTION_SERVICE_TEST_BIN_NAME=dnfui-service-tests
TRANSACTION_SERVICE_SMOKE_CLIENT_BIN_NAME=dnfui-service-smoke-client
TRANSACTION_SERVICE_BIN_DEST=/usr/libexec/dnfui-service
TRANSACTION_SERVICE_POLICY_FILE=packaging/com.fedora.dnfui.policy
TRANSACTION_SERVICE_POLICY_DEST=/usr/share/polkit-1/actions/com.fedora.dnfui.policy
TRANSACTION_SERVICE_DBUS_SERVICE_FILE=packaging/com.fedora.Dnfui.Transaction1.service
TRANSACTION_SERVICE_DBUS_SERVICE_DEST=/usr/share/dbus-1/system-services/com.fedora.Dnfui.Transaction1.service
TRANSACTION_SERVICE_DBUS_POLICY_FILE=packaging/com.fedora.Dnfui.Transaction1.conf
TRANSACTION_SERVICE_DBUS_POLICY_DEST=/usr/share/dbus-1/system.d/com.fedora.Dnfui.Transaction1.conf
TRANSACTION_SERVICE_SYSTEMD_UNIT_FILE=packaging/dnfui-service.service
TRANSACTION_SERVICE_SYSTEMD_UNIT_NAME=dnfui-service.service
TRANSACTION_SERVICE_SYSTEMD_UNIT_DEST=/usr/lib/systemd/system/dnfui-service.service
